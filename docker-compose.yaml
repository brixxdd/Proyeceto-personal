services:
  # PostgreSQL - Auth Service
  postgres-auth:
    image: postgres:15-alpine
    container_name: food-delivery-postgres-auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-delivery-network

  # PostgreSQL - Restaurant Service
  postgres-restaurant:
    image: postgres:15-alpine
    container_name: food-delivery-postgres-restaurant
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restaurant_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_restaurant_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-delivery-network

  # PostgreSQL - Order Service
  postgres-order:
    image: postgres:15-alpine
    container_name: food-delivery-postgres-order
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-delivery-network

  # PostgreSQL - Delivery Service
  postgres-delivery:
    image: postgres:15-alpine
    container_name: food-delivery-postgres-delivery
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: delivery_db
    ports:
      - "5436:5432"
    volumes:
      - postgres_delivery_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-delivery-network

  # PostgreSQL - Notification Service
  postgres-notification:
    image: postgres:15-alpine
    container_name: food-delivery-postgres-notification
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: notification_db
    ports:
      - "5437:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - food-delivery-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: food-delivery-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - food-delivery-network

  # Zookeeper (requerido por Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: food-delivery-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - food-delivery-network
    healthcheck:
      test: [ "CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/2181' 2>/dev/null; exit $?" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: food-delivery-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s
    networks:
      - food-delivery-network

  # Order Service
  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: order-service
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres-order:5432/order_db
      RESTAURANT_DB_URL: postgresql://postgres:postgres@postgres-restaurant:5432/restaurant_db
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      SERVICE_NAME: order-service
      JWT_SECRET: e4b51c89f212267b2d56a3e264024b898f98a280
      RESTAURANT_SERVICE_URL: http://restaurant-service:3001
    ports:
      - "3000:3000"
    depends_on:
      postgres-order:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
    restart: on-failure
    networks:
      - food-delivery-network

  # Restaurant Service
  restaurant-service:
    build:
      context: ./services/restaurant-service
      dockerfile: Dockerfile
    container_name: restaurant-service
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres-restaurant:5432/restaurant_db
      REDIS_URL: redis://redis:6379
      CACHE_TTL: 30
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      SERVICE_NAME: restaurant-service
    ports:
      - "3001:3001"
    depends_on:
      postgres-restaurant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - food-delivery-network

  # Auth Service
  auth-service:
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      NODE_ENV: development
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres-auth:5432/auth_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: e4b51c89f212267b2d56a3e264024b898f98a280
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_SECRET: 8b5d3a2e7c4146a81d11b33948e65a0b943d6342
      JWT_REFRESH_EXPIRES_IN: 7d
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      SERVICE_NAME: auth-service
    ports:
      - "3002:3002"
    depends_on:
      postgres-auth:
        condition: service_healthy
    networks:
      - food-delivery-network

  # API Gateway
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    environment:
      NODE_ENV: development
      PORT: 4000
      AUTH_SERVICE_URL: http://auth-service:3002/graphql
      RESTAURANT_SERVICE_URL: http://restaurant-service:3001/graphql
      ORDER_SERVICE_URL: http://order-service:3000/graphql
      ORDER_SERVICE_WS_URL: ws://order-service:3000/graphql
      REDIS_URL: redis://redis:6379
      JWT_SECRET: e4b51c89f212267b2d56a3e264024b898f98a280
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      SERVICE_NAME: api-gateway
    ports:
      - "4000:4000"
    depends_on:
      auth-service:
        condition: service_healthy
      restaurant-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    restart: on-failure
    networks:
      - food-delivery-network

  # Delivery Service
  delivery-service:
    build:
      context: ./services/delivery-service
      dockerfile: Dockerfile
    container_name: delivery-service
    environment:
      NODE_ENV: development
      PORT: 3003
      DATABASE_URL: postgresql://postgres:postgres@postgres-delivery:5432/delivery_db
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: delivery-service
      KAFKA_GROUP_ID: delivery-service-group
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      SERVICE_NAME: delivery-service
    ports:
      - "3003:3003"
    depends_on:
      postgres-delivery:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - food-delivery-network

  # Notification Service
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      NODE_ENV: development
      PORT: 3004
      DATABASE_URL: postgresql://postgres:postgres@postgres-notification:5432/notification_db
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      KAFKA_CLIENT_ID: notification-service
      KAFKA_GROUP_ID: notification-service-group
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      SERVICE_NAME: notification-service
    ports:
      - "3004:3004"
    depends_on:
      postgres-notification:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    networks:
      - food-delivery-network

  # ── Observability ──────────────────────────────────────────────────────────

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: food-delivery-alertmanager
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9094:9093"
    restart: unless-stopped
    networks:
      - food-delivery-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: food-delivery-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - food-delivery-network

  grafana:
    image: grafana/grafana:10.4.0
    container_name: food-delivery-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/food-delivery-overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3010:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - food-delivery-network

  loki:
    image: grafana/loki:2.9.0
    container_name: food-delivery-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    restart: unless-stopped
    networks:
      - food-delivery-network

  promtail:
    image: grafana/promtail:2.9.0
    container_name: food-delivery-promtail
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - food-delivery-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: food-delivery-cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8081:8080"
    restart: unless-stopped
    networks:
      - food-delivery-network

  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: food-delivery-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - food-delivery-network

  adminer:
    image: adminer
    container_name: food-delivery-adminer
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - food-delivery-network

  # Kafka topic initialiser (one-shot job)
  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init-topics
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/kafka-init-topics.sh:/kafka-init-topics.sh
    command: [ "bash", "/kafka-init-topics.sh" ]
    environment:
      KAFKA_BROKER: kafka:29092
    networks:
      - food-delivery-network

volumes:
  postgres_auth_data:
  postgres_restaurant_data:
  postgres_order_data:
  postgres_delivery_data:
  postgres_notification_data:
  redis_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_data:

networks:
  food-delivery-network:
    driver: bridge

# Run seed: node scripts/seed.js
