site_name: Plataforma de Pedidos en Tiempo Real
site_description: Documentación técnica de la plataforma de pedidos cloud-native
site_author: Food Delivery Platform Team
site_url: https://food-delivery-platform.github.io/docs

repo_name: food-delivery-platform/docs
repo_url: https://github.com/food-delivery-platform/docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true

nav:
  - Inicio: index.md
  - Arquitectura:
    - architecture/overview.md
    - architecture/c4-context.md
    - architecture/c4-containers.md
    - architecture/decisions/
  - Guías:
    - installation/local-setup.md
    - installation/kubernetes-deployment.md
    - api/graphql-schema.md
    - api/examples.md
  - Observabilidad:
    - observability/metrics.md
    - observability/logging.md
    - observability/tracing.md
  - Desarrollo:
    - development/contributing.md
    - development/coding-standards.md
    - development/testing.md
  - DevOps:
    - devops/ci-cd.md
    - devops/terraform.md
    - devops/helm.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/food-delivery-platform
  version:
    provider: mike

