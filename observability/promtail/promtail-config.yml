server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
        filters:
          - name: network
            values: ["food-delivery-network"]

    relabel_configs:
      # Use the container name as the instance label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      # Map Docker container name to a service label
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.+)'
        target_label: service
      # Capture the compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      # Capture the Docker image name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
      # Only keep containers that have a name (filter out unnamed)
      - source_labels: ['container']
        regex: '.+'
        action: keep

    pipeline_stages:
      # Parse JSON logs emitted by Winston
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
            service: service
            requestId: requestId
            method: method
            path: path
            statusCode: statusCode
            duration: duration
            error: error

      # Promote Winston level to a Loki label for fast filtering
      - labels:
          level:
          service:

      # Use the Winston timestamp as the log line timestamp when present
      - timestamp:
          source: timestamp
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - UnixMs

      # Reformat the output line to keep only the message + key fields
      - output:
          source: message
