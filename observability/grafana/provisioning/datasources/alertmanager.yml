apiVersion: 1

datasources:
  - name: Alertmanager
    type: alertmanager
    uid: alertmanager
    url: http://alertmanager:9093
    access: proxy
    jsonData:
      # Use the Alertmanager implementation type.
      # "prometheus" works for Prometheus-bundled Alertmanager.
      implementation: prometheus
      handleGrafanaManagedAlerts: false
    editable: false
