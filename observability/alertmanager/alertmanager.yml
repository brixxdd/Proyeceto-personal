global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alertmanager@food-delivery.local'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'

# The root route. All alerts that don't match a child route fall here.
route:
  receiver: 'null'
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts → Slack
    - matchers:
        - severity = "critical"
      receiver: 'slack'
      group_wait: 10s
      repeat_interval: 1h

    # Warning alerts → null (silenced)
    - matchers:
        - severity = "warning"
      receiver: 'null'

receivers:
  - name: 'null'

  - name: 'slack'
    slack_configs:
      - api_url: 'https://hooks.slack.com/services/REPLACE_WITH_REAL_WEBHOOK'
        channel: '#alerts'
        send_resolved: true
        title: '{{ if eq .Status "firing" }}:red_circle:{{ else }}:large_green_circle:{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: |
          *Service:* {{ .CommonLabels.job | default "unknown" }}
          *Severity:* {{ .CommonLabels.severity }}
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Started:* {{ .StartsAt | since }}
          {{ end }}

  - name: 'email'
    email_configs:
      - to: 'alerts@food-delivery.local'
        require_tls: false
        send_resolved: true
        headers:
          Subject: '[{{ .Status | toUpper }}] Food Delivery Alert: {{ .CommonLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          Alert: {{ .Labels.alertname }}
          Service: {{ .Labels.job }}
          Severity: {{ .Labels.severity }}
          Summary: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Started: {{ .StartsAt }}
          {{ end }}

# Inhibit rules: a critical alert suppresses the matching warning alert
# for the same service so operators are not flooded with lower-severity noise.
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal:
      - job
      - alertname
