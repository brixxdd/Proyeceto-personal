{{- if .Values.secrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "api-gateway.fullname" . }}-secrets
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.redis-url }}
  redis-url: {{ .Values.secrets.redis-url | b64enc }}
  {{- end }}
  {{- if .Values.secrets.jwt-secret }}
  jwt-secret: {{ .Values.secrets.jwt-secret | b64enc }}
  {{- end }}
{{- end }}
