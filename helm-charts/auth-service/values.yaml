replicaCount: 2

image:
  repository: ghcr.io/food-delivery-platform/auth-service
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3002"
  prometheus.io/path: "/metrics"

podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 3002
  targetPort: 3002

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: auth-service.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

env:
  - name: NODE_ENV
    value: "production"
  - name: PORT
    value: "3002"
  - name: JWT_EXPIRES_IN
    value: "1h"
  - name: JWT_REFRESH_EXPIRES_IN
    value: "7d"
  - name: DATABASE_URL
    valueFrom:
      secretKeyRef:
        name: auth-service-secrets
        key: database-url
  - name: REDIS_URL
    valueFrom:
      secretKeyRef:
        name: auth-service-secrets
        key: redis-url
  - name: JWT_SECRET
    valueFrom:
      secretKeyRef:
        name: auth-service-secrets
        key: jwt-secret
  - name: JWT_REFRESH_SECRET
    valueFrom:
      secretKeyRef:
        name: auth-service-secrets
        key: jwt-refresh-secret

configMap:
  enabled: true
  data: {}

secrets:
  enabled: true
  database-url: ""
  redis-url: ""
  jwt-secret: ""
  jwt-refresh-secret: ""

serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
