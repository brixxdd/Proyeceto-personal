name: Notification Service CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/notification-service/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'services/notification-service/**'

env:
  SERVICE_NAME: notification-service
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.SERVICE_NAME }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/notification-service/package-lock.json

      - name: Install dependencies
        working-directory: ./services/notification-service
        run: npm ci

      - name: Run linter
        working-directory: ./services/notification-service
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    # Unit tests mock pg.Pool, Kafka, and Redis pub client — no real services needed
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/notification-service/package-lock.json

      - name: Install dependencies
        working-directory: ./services/notification-service
        run: npm ci

      - name: Run tests
        working-directory: ./services/notification-service
        env:
          NODE_ENV: test
          KAFKA_TOPIC_ORDER_CREATED: order.created
          KAFKA_TOPIC_ORDER_ASSIGNED: order.assigned
          KAFKA_TOPIC_ORDER_DELIVERED: order.delivered
          KAFKA_TOPIC_ORDER_CANCELLED: order.cancelled
          KAFKA_TOPIC_DELIVERY_ASSIGNED: delivery.assigned
        run: npm test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./services/notification-service/coverage/lcov.info
          flags: notification-service

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./services/notification-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: Deploy to ArgoCD
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Update Helm chart image tag
        run: |
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" helm-charts/notification-service/values.yaml

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add helm-charts/notification-service/values.yaml
          git commit -m "Update notification-service image to ${{ github.sha }}" || exit 0
          git push

      - name: Sync ArgoCD Application
        uses: kubectl-action/kubectl@master
        with:
          kubectl-version: 'latest'
        env:
          KUBECONFIG: ${{ secrets.KUBECONFIG }}
        run: |
          kubectl patch application notification-service -n argocd \
            --type merge \
            -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"revision":"HEAD"}}}'
